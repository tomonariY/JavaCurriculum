<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ユーザー登録</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <h1>ユーザー登録</h1>
	  
	  <p th:if="${error}" th:text="${error}" style="color: red;"></p> 
      <form th:action="@{/registar}" method="post">
        <div class="form-group">
          <label>ユーザー名</label>
          <input type="text" name="username" placeholder="希望するユーザー名" required>
          <span class="input-help">※半角英数字で入力してください</span>
        </div>

        <div class="form-group">
          <label>パスワード</label>
          <input type="password" name="password" placeholder="パスワード（英数字）" required>
          <span class="input-help">※半角英数字で入力してください</span>
        </div>
        
        <button type="submit" class="btn-primary">登録する</button>
      </form>
      
      <div class="auth-footer">
        <a th:href="@{/login}">＞ 登録済みの方（ログイン）はこちら</a>
      </div>
    </div>
  </div>

</body>
</html>
