<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>タスク編集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>

<div class="form-container">
<div class="form-card">
  <form th:action="@{/tasks/edit}" th:object="${taskForm}" method="post">
    <h1>タスク編集</h1>
    
    <div class="form-group row-id">
      <label>タスクID</label>
      <span th:text="*{id}" class="id-value"></span>
    </div>

    <input type="hidden" th:field="*{id}">

    <div class="form-group">
      <label>タイトル</label>
      <input type="text" th:field="*{title}" placeholder="タスクのタイトルを入力">
    </div>
    
    <div class="form-group">
      <label>内容</label>
      <textarea th:field="*{content}" placeholder="タスクの詳細内容を入力"></textarea>
    </div>
    
    <div class="form-group">
      <label>名前</label>
      <input type="text" th:field="*{name}" placeholder="登録者の名前を入力">
    </div>
    
    <div class="form-group">
      <label>開始日</label>
      <input type="date" th:field="*{startDate}">
    </div>
    
    <div class="form-group">
      <label>終了日</label>
      <input type="date" th:field="*{endDate}">
    </div>
    
    <div class="form-actions">
      <button type="submit" class="btn-submit">更新する</button>
      <a th:href="@{/tasks}" class="btn-cancel">キャンセル</a>
    </div>
  </form>
</div>
</div>

</body>
</html>
